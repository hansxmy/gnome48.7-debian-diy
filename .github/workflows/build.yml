name: Build Surface GO GNOME .deb packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-gnome-shell:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gnome-shell
        env:
          RUN_TESTS: '0'
          LOCAL_SUFFIX: "+${{ github.ref_name }}"
        run: |
          # Sanitize LOCAL_SUFFIX: replace Debian-illegal chars with '-'
          export LOCAL_SUFFIX="$(echo "$LOCAL_SUFFIX" | tr -c 'a-zA-Z0-9.+~\n' '-')"
          chmod +x gnome-shell/scripts/build-deb.sh
          ./gnome-shell/scripts/build-deb.sh

      - name: Upload gnome-shell debs
        uses: actions/upload-artifact@v4
        with:
          name: gnome-shell-debs
          path: gnome-shell/dist/*.deb

  build-gnome-control-center:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gnome-control-center
        env:
          RUN_TESTS: '0'
          LOCAL_SUFFIX: "+${{ github.ref_name }}"
        run: |
          # Sanitize LOCAL_SUFFIX: replace Debian-illegal chars with '-'
          export LOCAL_SUFFIX="$(echo "$LOCAL_SUFFIX" | tr -c 'a-zA-Z0-9.+~\n' '-')"
          chmod +x gnome-control-center/scripts/build.sh
          ./gnome-control-center/scripts/build.sh

      - name: Upload gnome-control-center debs
        uses: actions/upload-artifact@v4
        with:
          name: gnome-control-center-debs
          path: gnome-control-center/dist/*.deb

  release:
    needs: [build-gnome-shell, build-gnome-control-center]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
