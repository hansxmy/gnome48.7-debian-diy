name: Build Dock GNOME Shell .deb

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        env:
          RUN_TESTS: '1'
          LOCAL_SUFFIX: "+${{ github.ref_name }}"
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dock-gnome-shell-deb-${{ github.ref_name }}
          path: dist/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
